# Blueprint: split deploy — Render Static Site for examples + Docker API for SpacetimeDB.
#
# Render defaults to a root `render.yaml`; when creating this Blueprint, select this file
# as the Blueprint path, or copy it over `render.yaml` if you want split deploys to be
# the repo default.
#
# Important: VITE_STDB_URI is compiled into the static frontend at build time. If Render
# gives the API service a different public URL than the value below, update VITE_STDB_URI
# and redeploy the static site.
#
# The examples service is still a static site: the Rust runtime is compiled to a
# `.wasm` asset during the build and served with the SPA.
services:
  - type: web
    runtime: docker
    name: zylem-spacetimedb-api
    plan: starter
    dockerfilePath: ./packages/server/render/Dockerfile.api
    dockerContext: .
    healthCheckPath: /v1/ping
    envVars:
      - key: PORT
        value: "10000"
      - key: SPACETIMEDB_DATA_DIR
        value: /var/data/spacetimedb
      - key: SPACETIMEDB_MODULE_PATH
        value: /app/spacetimedb
      - key: SPACETIMEDB_DATABASE_NAME
        value: zylem-entity-transforms-v2
      - key: SPACETIMEDB_AUTO_PUBLISH
        value: "true"
      # Ephemeral DB: wipe + republish on every deploy (demo/staging semantics).
      - key: SPACETIMEDB_PUBLISH_DELETE_DATA
        value: "true"
    disk:
      name: spacetimedb-data
      mountPath: /var/data
      sizeGB: 10

  - type: web
    runtime: static
    name: zylem-examples
    buildCommand: sh ./scripts/render-build-examples.sh
    staticPublishPath: ./packages/examples/dist
    envVars:
      - key: VITE_STDB_URI
        value: https://zylem-spacetimedb-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

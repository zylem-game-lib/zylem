[package]
name = "zylem-runtime"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "Rust runtime scaffolding for Zylem simulation and future wasm builds."
publish = false

[lib]
crate-type = ["rlib", "cdylib"]

[dependencies]
rapier3d = { version = "0.32.0", features = ["debug-render"] }
shipyard = { version = "0.11.2", default-features = false, features = ["proc", "std"] }
